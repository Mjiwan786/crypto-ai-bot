# Prometheus configuration for crypto-ai-bot monitoring
# 
# This configuration scrapes metrics from:
# - crypto-ai-bot metrics endpoint (port 9108)
# - Prometheus itself (self-monitoring)
#
# Environment Adaptation:
# - Docker Desktop (Windows/Mac): Use host.docker.internal:9108
# - Docker Compose (co-located): Use bot:9108 (service name)
# - Staging: Replace with staging hostname (e.g., staging-bot.example.com:9108)
# - Production: Replace with production hostname (e.g., bot.example.com:9108)

global:
  scrape_interval: 15s      # Global scrape interval
  evaluation_interval: 15s  # Rule evaluation interval
  external_labels:
    cluster: 'crypto-ai-bot'
    environment: 'development'  # Change to 'staging' or 'production' as needed

# Rule files (optional - for alerting rules)
rule_files:
  - "slo_alerts.yml"

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Scrape configurations
scrape_configs:
  # Crypto AI Bot metrics
  - job_name: 'crypto-ai-bot'
    static_configs:
      - targets: 
        # Docker Desktop (Windows/Mac) - uncomment this line:
        - 'host.docker.internal:9108'
        
        # Docker Compose (co-located) - uncomment this line:
        # - 'bot:9108'
        
        # Staging environment - uncomment and modify:
        # - 'staging-bot.example.com:9108'
        
        # Production environment - uncomment and modify:
        # - 'bot.example.com:9108'
        
        # Local development - uncomment this line:
        # - 'localhost:9108'
    
    scrape_interval: 15s
    metrics_path: '/metrics'
    scheme: 'http'
    
    # Optional: Add labels to identify the bot instance
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):.*'
        replacement: '${1}'
      - target_label: service
        replacement: 'crypto-ai-bot'
      - target_label: component
        replacement: 'trading-bot'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 15s
    metrics_path: '/metrics'
    scheme: 'http'

  # Optional: Node exporter for system metrics
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['host.docker.internal:9100']  # Adjust for your setup
  #   scrape_interval: 15s

  # Optional: Redis exporter for Redis metrics
  # - job_name: 'redis-exporter'
  #   static_configs:
  #     - targets: ['host.docker.internal:9121']  # Adjust for your setup
  #   scrape_interval: 15s

# Storage configuration
storage:
  tsdb:
    retention.time: 15d      # Keep data for 15 days
    retention.size: 1GB      # Or 1GB, whichever comes first

# Remote write configuration (optional - for long-term storage)
# remote_write:
#   - url: "https://prometheus-remote-write.example.com/api/v1/write"
#     basic_auth:
#       username: "prometheus"
#       password: "secret"

# Remote read configuration (optional - for querying from external storage)
# remote_read:
#   - url: "https://prometheus-remote-read.example.com/api/v1/read"
#     basic_auth:
#       username: "prometheus"
#       password: "secret"