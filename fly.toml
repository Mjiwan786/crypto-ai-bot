# ===============================================
# Fly.io Configuration for Crypto AI Bot
# 24/7 Worker Deployment with Health Checks
# ===============================================

app = "crypto-ai-bot"
primary_region = "ewr"  # Newark, NJ (closest to Redis Cloud us-east-1-4)
kill_signal = "SIGTERM"
kill_timeout = "30s"

# Build configuration
[build]

# Deployment configuration
[deploy]
  strategy = "rolling"

# VM configuration - adjust based on workload
[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

# Auto-scaling configuration
[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = false  # ⚠️ CRITICAL: Never auto-stop worker
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

# HTTP health checks
[[http_service.checks]]
  interval = "30s"
  timeout = "10s"
  grace_period = "60s"
  method = "GET"
  path = "/health"

# Environment variables (non-sensitive)
[env]
  ENVIRONMENT = "prod"
  LOG_LEVEL = "INFO"
  TZ = "America/Toronto"
  PYTHONUNBUFFERED = "1"
  HEALTH_API_PORT = "8080"
  PAPER_TRADING_ENABLED = "true"

# Metrics (Prometheus-compatible)
[metrics]
  port = 9091
  path = "/metrics"

# ===============================================
# SECRETS CONFIGURATION (set via Fly CLI)
# ===============================================
# NEVER commit actual secrets to this file!
#
# Set secrets with:
#   fly secrets set REDIS_URL="rediss://default:PASSWORD@redis-19818.c9.us-east-1-4.ec2.redns.redis-cloud.com:19818/0"
#   fly secrets set KRAKEN_API_KEY="your_kraken_api_key"
#   fly secrets set KRAKEN_API_SECRET="your_kraken_api_secret"
#   fly secrets set DISCORD_BOT_TOKEN="your_discord_token"
#   fly secrets set DISCORD_CHANNEL_ID="your_channel_id"
#
# Optional (for live trading - use with EXTREME caution):
#   fly secrets set PAPER_TRADING_ENABLED="false"
#   fly secrets set LIVE_TRADING_CONFIRMATION="I-accept-the-risk"
#
# List secrets:
#   fly secrets list
#
# Remove secret:
#   fly secrets unset SECRET_NAME
# ===============================================
