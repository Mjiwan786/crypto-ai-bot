# fly.toml - crypto-ai-bot worker configuration
# Background worker process (no HTTP service)

app = 'crypto-ai-bot'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "prod"
  MODE = "paper"
  LOG_LEVEL = "INFO"
  PYTHONUNBUFFERED = "1"
  REDIS_TLS_CERT_PATH = "/app/config/certs/redis_ca.pem"

# HTTP service configuration for health endpoint
[[services]]
  processes = ["app"]
  protocol = "tcp"
  internal_port = 8080
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["http", "tls"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "30s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "60s"
    method = "get"
    path = "/health"
    protocol = "http"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
