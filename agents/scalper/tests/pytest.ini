[pytest]
# Pytest configuration for scalper agent tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 7.0

# Output options
addopts =
    # Verbose output with test names
    -v
    # Show local variables in tracebacks
    --showlocals
    # Show summary of all test outcomes
    -ra
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Disable warnings summary (reduces noise)
    -p no:warnings
    # Output coverage if pytest-cov is installed
    --cov=agents.scalper
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov
    --cov-fail-under=80

# Test paths
testpaths =
    agents/scalper/tests

# Markers for test categorization
markers =
    unit: Unit tests (fast, no I/O)
    integration: Integration tests (may involve multiple components)
    slow: Slow tests (>1s execution time)
    smoke: Smoke tests (quick sanity checks)
    performance: Performance/benchmark tests

# Asyncio configuration
asyncio_mode = auto

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeouts (requires pytest-timeout)
timeout = 60
timeout_method = thread

# Doctest configuration
doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS

# Ignore paths
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    __pycache__
    htmlcov

# Filter warnings
filterwarnings =
    # Ignore all warnings by default
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    # But show warnings from our code
    default::DeprecationWarning:agents.*
