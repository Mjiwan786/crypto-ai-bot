# Trend Following Strategy Configuration
# PRD-001 Section 7.1: Individual strategy configuration

strategy:
  name: trend
  description: "Trend following strategy capturing medium-term directional moves"

  # Entry/Exit Parameters
  entry:
    min_trend_strength: 0.7  # Minimum ADX for trend confirmation
    min_edge_bps: 25  # Minimum edge in basis points
    max_spread_bps: 10  # Maximum spread to enter
    volume_confirmation: true

  exit:
    take_profit_bps: 100  # Take profit target (1%)
    stop_loss_bps: 50  # Stop loss (0.5%)
    trailing_stop_bps: 30  # Trailing stop
    max_hold_hours: 48  # Maximum position hold time

  # Position Sizing
  position:
    risk_per_trade_pct: 2.0  # Risk per trade (% of capital)
    max_position_size_usd: 5000  # Maximum position size
    min_position_size_usd: 200  # Minimum position size
    scale_in_enabled: true  # Allow position scaling
    scale_in_increments: 3  # Number of scale-in points

  # Risk Management
  risk:
    max_daily_trades: 10
    max_consecutive_losses: 2
    cooldown_after_loss_minutes: 30

  # Indicators
  indicators:
    ema_fast: 20
    ema_slow: 50
    ema_trend: 200
    adx_period: 14
    adx_threshold: 25
    rsi_period: 14
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9

  # Filters
  filters:
    min_liquidity_usd: 5000000
    min_volatility_pct: 1.0
    max_volatility_pct: 10.0
    require_higher_timeframe_confirmation: true
    trading_hours_utc: "00:00-23:59"  # 24/7
