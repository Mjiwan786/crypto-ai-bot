# Turbo Scalper Strategy - 15-Second Timeframe
# Optimized for high-frequency paper trading with strict risk controls

strategy:
  name: "turbo_scalper_15s"
  description: "Ultra-fast scalping strategy on 15s bars with momentum filters"
  timeframe: "15s"
  mode: "scalp"

  # 5s bars (conditional enable based on latency)
  enable_5s_bars: false
  auto_enable_5s: true
  latency_threshold_ms: 50  # Enable 5s only if p95 < 50ms

  # Entry triggers
  min_momentum_bps: 3.0      # Minimum 3 bps momentum
  momentum_window_sec: 30     # 30-second momentum window

  # Orderbook requirements
  min_bid_ask_depth_usd: 500000  # $500k min depth
  max_spread_bps: 3.0             # Max 3 bps spread

  # Risk management
  target_bps: 8.0            # 8 bps profit target
  stop_loss_bps: 6.0         # 6 bps stop loss
  risk_reward_ratio: 1.33    # 8/6 = 1.33:1

  # Position sizing
  risk_per_trade_pct: 0.5    # 0.5% of capital per scalp
  min_position_usd: 100.0
  max_position_usd: 1000.0

  # Execution
  order_type: "limit"
  post_only: true            # Maker only (rebates)
  hidden_orders: false
  max_slippage_bps: 3

  # Rate limiting
  max_trades_per_minute: 6
  max_trades_per_hour: 120
  daily_trade_limit: 500
  cooldown_after_loss_sec: 60
  max_hold_seconds: 90       # Exit if not filled in 90s

  # Filters
  trading_hours: "24/7"
  avoid_rollover: true
  avoid_high_impact_news: true

# Pairs
pairs:
  - "BTC/USD"
  - "ETH/USD"
  - "SOL/USD"

# Protection Mode - Automatic capital preservation when nearing target
protection_mode:
  enabled: true
  force_enabled: null  # Manual override: true/false/null (null = automatic)

  # Activation triggers
  equity_threshold_usd: 18000.0  # Activate when equity ≥ $18k (80% to target)
  win_streak_threshold: 5  # Activate after 5 consecutive wins

  # Protection adjustments (multipliers applied to base params)
  risk_multiplier: 0.5  # Halve position sizes (0.5% → 0.25%)
  sl_multiplier: 0.7    # Tighten stops (6 bps → 4.2 bps)
  tp_multiplier: 1.0    # Keep targets same (8 bps)
  rate_multiplier: 0.5  # Reduce max trades/min (6 → 3)

  # Deactivation criteria
  deactivate_on_loss: false  # Stay in protection mode even after a loss
  deactivate_below_equity: 17000.0  # Re-enable aggression if equity drops below $17k

  # Alerts
  alert_on_activation: true
  alert_on_deactivation: true

# Risk limits
risk:
  max_concurrent_positions: 3
  max_daily_loss_pct: 3.0
  max_drawdown_pct: 5.0
  portfolio_heat_limit_pct: 60.0

# Backtesting
backtest:
  lookback_days: 7
  warmup_bars: 100
  maker_fee_bps: 16
  taker_fee_bps: 26
  slippage_bps: 3
