# 48-Hour Paper Trading Soak Test Configuration - Turbo Scalper Mode
# Version: SOAK-TEST-v1.0
# Date: 2025-11-08
# Mode: PAPER (48h validation before PROD promotion)

# =============================================================================
# SOAK TEST METADATA
# =============================================================================
soak_test:
  version: "v1.0"
  duration_hours: 48
  start_time: null  # Set automatically at runtime
  mode: "paper"
  purpose: "Validate turbo scalper + bar_reaction_5m for PROD promotion"

  # Success criteria (automated validation)
  success_gates:
    min_net_pnl_usd: 0.01  # Must be positive (even $0.01 is passing)
    min_profit_factor: 1.25
    max_circuit_breaker_trips_per_hour: 3
    max_scalper_lag_messages: 5
    max_portfolio_heat_pct: 80.0
    max_latency_p95_ms: 500
    max_redis_lag_seconds: 2.0

# =============================================================================
# BOT CONFIGURATION
# =============================================================================
bot:
  mode: "PAPER"
  enable_trading: true
  paper_trading_enabled: true
  paper_starting_capital_usd: 10000.0

  # Logging
  log_level: "INFO"
  log_trades: true
  log_signals: true
  log_circuit_breakers: true

  # Health monitoring
  heartbeat_interval_sec: 30
  health_check_interval_sec: 60

# =============================================================================
# STRATEGIES CONFIGURATION
# =============================================================================
strategies:
  # Active strategies for soak test
  active:
    - "bar_reaction_5m"
    - "turbo_scalper_15s"

  # Strategy allocation (capital split)
  allocation:
    bar_reaction_5m: 0.60      # 60% to 5m bar reaction
    turbo_scalper_15s: 0.40    # 40% to turbo scalper

  # Individual strategy configs
  bar_reaction_5m:
    config_path: "config/bar_reaction_5m_aggressive.yaml"
    enabled: true

  turbo_scalper_15s:
    config_path: "config/turbo_scalper_15s.yaml"
    enabled: true
    timeframe: "15s"
    enable_5s_bars: false  # Keep 5s OFF unless latency < threshold
    enable_on_low_latency: true  # Auto-enable if latency allows
    low_latency_threshold_ms: 50  # Enable 5s if p95 latency < 50ms

# =============================================================================
# TURBO SCALPER CONFIGURATION (15s)
# =============================================================================
turbo_scalper:
  name: "turbo_scalper_15s"
  timeframe: "15s"

  # 5s bars (DISABLED by default, conditional enable)
  enable_5s_bars: false
  auto_enable_5s_on_low_latency: true
  latency_threshold_for_5s_ms: 50

  # Trading parameters
  pairs:
    - "BTC/USD"
    - "ETH/USD"
    - "SOL/USD"

  # Risk management
  target_bps: 8.0           # 8 bps profit target (tighter for scalping)
  stop_loss_bps: 6.0        # 6 bps stop loss
  risk_per_trade_pct: 0.5   # 0.5% risk per scalp

  # Position limits
  min_position_usd: 100.0
  max_position_usd: 1000.0
  max_concurrent_positions: 3

  # Execution constraints
  preferred_order_type: "limit"
  post_only: true
  hidden_orders: false
  max_slippage_bps: 3
  max_spread_bps: 3.0
  min_liquidity_usd: 1000000.0

  # Rate limiting
  max_trades_per_minute: 6
  max_trades_per_hour: 120
  daily_trade_limit: 500
  cooldown_after_loss_seconds: 60
  max_hold_seconds: 90

  # Momentum filters
  min_momentum_bps: 3.0
  momentum_window_seconds: 30

# =============================================================================
# PROTECTION MODE (Shared across all strategies)
# =============================================================================
protection_mode:
  enabled: true
  force_enabled: null  # Manual override: true/false/null (auto)

  # Activation triggers
  equity_threshold_usd: 18000.0  # Activate when equity ≥ $18k (80% to target)
  win_streak_threshold: 5  # Activate after 5 consecutive wins

  # Protection adjustments (multipliers applied to base params)
  risk_multiplier: 0.5  # Halve position sizes
  sl_multiplier: 0.7    # Tighten stops to 70%
  tp_multiplier: 1.0    # Keep targets same
  rate_multiplier: 0.5  # Reduce max trades/min to 50%

  # Deactivation criteria
  deactivate_on_loss: false  # Stay in protection mode even after a loss
  deactivate_below_equity: 17000.0  # Re-enable aggression if equity drops below $17k

  # Alerts
  alert_on_activation: true
  alert_on_deactivation: true

# =============================================================================
# NEWS OVERRIDES (Test Window Configuration)
# =============================================================================
news_overrides:
  # Default: DISABLED
  enabled: false

  # Test window (4 hours)
  test_window_enabled: false  # Manually flip ON for 4h test
  test_window_duration_hours: 4
  test_window_start_time: null  # Set when enabling (UTC timestamp)

  # News sources
  sources:
    - "twitter_crypto_alerts"
    - "binance_announcements"
    - "fed_fomc"

  # Override behavior
  on_high_impact_news:
    action: "close_all_positions"
    pause_new_entries_minutes: 15
    reduce_position_size_multiplier: 0.5

  on_medium_impact_news:
    action: "reduce_position_size"
    size_multiplier: 0.7

  # Alert channels
  alert_on_news: true
  alert_channels:
    - "discord"
    - "prometheus"

# =============================================================================
# RISK MANAGEMENT & CIRCUIT BREAKERS
# =============================================================================
risk:
  # Portfolio-level limits
  max_portfolio_heat_pct: 80.0          # Alert threshold
  max_total_exposure_pct: 150.0
  max_leverage: 2.0

  # Daily limits
  max_daily_loss_pct: 8.0
  max_daily_trades: 600  # Combined across all strategies

  # Drawdown management
  max_drawdown_pct: 12.0
  drawdown_pause_threshold_pct: 10.0    # Pause at -10% DD

  # Position sizing
  position_size_method: "dynamic_atr"

# Circuit breakers
circuit_breakers:
  enabled: true
  log_all_trips: true
  alert_on_trip: true

  # Daily loss breaker
  daily_loss:
    threshold_pct: 5.0
    action: "pause_trading"
    cooldown_minutes: 60

  # Consecutive losses
  consecutive_losses:
    threshold_count: 4
    action: "reduce_size"
    size_multiplier: 0.5
    reset_after_win: true

  # High spread
  high_spread:
    threshold_bps: 15.0
    action: "reject_trade"

  # High latency
  high_latency:
    threshold_ms: 500
    action: "reject_trade"
    alert: true

  # Stream lag
  stream_lag:
    threshold_seconds: 2.0
    action: "pause_strategy"
    affected_strategies: ["turbo_scalper_15s"]

  # Portfolio heat
  portfolio_heat:
    threshold_pct: 80.0
    action: "close_losing_positions"
    alert: true

# =============================================================================
# MONITORING & METRICS
# =============================================================================
monitoring:
  # Performance metrics (already enabled)
  enable_performance_metrics: true
  metrics_update_interval_sec: 30

  # Prometheus
  prometheus_enabled: true
  prometheus_port: 9108
  prometheus_addr: "0.0.0.0"

  # Additional soak test metrics
  track_soak_test_metrics: true
  soak_test_metrics:
    - "pnl_cumulative"
    - "pnl_by_strategy"
    - "profit_factor"
    - "win_rate"
    - "circuit_breaker_trips"
    - "latency_p95"
    - "latency_p99"
    - "redis_lag"
    - "portfolio_heat"
    - "trade_count_by_strategy"
    - "fill_quality"

  # Alerting
  alerts_enabled: true
  alert_channels:
    discord: true
    prometheus: true
    redis_stream: true  # Publish to metrics:alerts stream

  # Alert thresholds (trigger alerts)
  alert_thresholds:
    portfolio_heat_pct: 80.0
    latency_p95_ms: 500
    redis_lag_seconds: 2.0
    circuit_breaker_trips_per_hour: 3
    daily_loss_pct: 5.0
    drawdown_pct: 8.0

# =============================================================================
# DATA INGESTION
# =============================================================================
kraken:
  # WebSocket settings
  ws_url: "wss://ws.kraken.com"
  reconnect_delay_sec: 3
  max_retries: 5
  ping_interval_sec: 20
  heartbeat_interval_sec: 15

  # Circuit breaker
  circuit_breaker_errors: 3
  circuit_breaker_cooldown_sec: 45

  # Subscription
  pairs:
    - "BTC/USD"
    - "ETH/USD"
    - "SOL/USD"

  channels:
    - "trade"
    - "spread"
    - "book:10"  # 10-level orderbook
    - "ohlc:1"   # 1-min bars

  # Rate limiting
  max_requests_per_minute: 60

# =============================================================================
# REDIS CONFIGURATION
# =============================================================================
redis:
  # Connection (Redis Cloud TLS) - URL should come from REDIS_URL environment variable
  # This is a placeholder - the actual URL will be loaded from environment
  url: "${REDIS_URL}"
  tls_enabled: true
  tls_ca_cert_path: "config/certs/redis_ca.pem"

  # Connection pool
  max_connections: 20
  socket_timeout_sec: 5
  socket_connect_timeout_sec: 5

  # Retry
  retry_on_timeout: true
  max_retries: 3

  # Health checks
  health_check_interval_sec: 30

  # Streams
  streams:
    signals: "signals:paper"
    trades: "trades:paper"
    metrics: "metrics:performance"
    alerts: "metrics:alerts"
    soak_test: "soak_test:v1"  # Dedicated soak test stream

  # Stream management
  max_stream_length: 10000
  trim_threshold: 5000

# =============================================================================
# SOAK TEST REPORTING
# =============================================================================
reporting:
  enabled: true

  # Checkpoint reports (every 6 hours)
  checkpoint_interval_hours: 6
  checkpoint_reports:
    - "pnl_summary"
    - "strategy_performance"
    - "circuit_breaker_summary"
    - "latency_stats"
    - "trade_stats"

  # Final report (at 48h)
  final_report_enabled: true
  final_report_path: "reports/soak_test_48h_{timestamp}.json"
  final_report_format: "json"

  # Prometheus snapshot
  export_prometheus_snapshot: true
  prometheus_snapshot_path: "reports/prometheus_snapshot_{timestamp}.json"

  # Pass/Fail validation
  auto_validate_success_gates: true
  on_success:
    action: "tag_config_as_prod_candidate"
    tag_format: "PROD-CANDIDATE-v{version}"
    export_snapshot: true
    notify_channels: ["discord", "redis"]

  on_failure:
    action: "generate_failure_report"
    analyze_root_causes: true
    recommend_adjustments: true

# =============================================================================
# EXECUTION SETTINGS
# =============================================================================
execution:
  # Order types
  default_order_type: "limit"
  allow_market_orders: false

  # Fills
  simulate_realistic_fills: true
  maker_queue_delay_bars: 1

  # Fees (Kraken)
  maker_fee_bps: 16
  taker_fee_bps: 26

  # Slippage
  default_slippage_bps: 2
  high_volatility_slippage_bps: 5

# =============================================================================
# FEATURE FLAGS
# =============================================================================
features:
  # Soak test features
  enable_soak_test_mode: true
  enable_detailed_logging: true
  enable_trade_replay: false  # For post-mortem analysis

  # Performance metrics
  enable_performance_metrics: true
  enable_prometheus_metrics: true
  enable_redis_metrics: true

  # Safety features
  enable_circuit_breakers: true
  enable_risk_limits: true
  enable_health_checks: true

  # Experimental features (OFF for soak test)
  enable_ml_predictor: false
  enable_arbitrage: false
  enable_market_making: false

# =============================================================================
# LOGGING
# =============================================================================
logging:
  level: "INFO"
  format: "json"
  output:
    - "file"
    - "console"

  # File logging
  log_dir: "logs"
  log_file: "soak_test_48h_{timestamp}.log"
  max_file_size_mb: 100
  max_backup_files: 5

  # Structured logging fields
  include_fields:
    - "timestamp"
    - "level"
    - "message"
    - "strategy"
    - "symbol"
    - "pnl"
    - "latency_ms"
    - "circuit_breaker"

  # Log specific events
  log_events:
    trade_opened: true
    trade_closed: true
    signal_generated: true
    signal_filtered: true
    circuit_breaker_tripped: true
    alert_triggered: true
    news_event: true
    latency_spike: true

# =============================================================================
# VALIDATION METADATA
# =============================================================================
validation:
  config_version: "v1.0"
  config_hash: null  # Computed at runtime
  validated_by: "soak_test_validator.py"
  validation_timestamp: null

  # Dependencies
  requires:
    - "bar_reaction_5m_aggressive.yaml"
    - "turbo_scalper_15s.yaml"

  # Compatibility
  min_python_version: "3.9"
  min_redis_version: "6.0"

  # Expected outcomes (for automated testing)
  expected_outcomes:
    min_trades: 50  # At least 50 trades in 48h
    max_trades: 1000  # No more than 1000 trades
    strategies_active: ["bar_reaction_5m", "turbo_scalper_15s"]
