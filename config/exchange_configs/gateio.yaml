# =============================================================================
# CRYPTO-AI-BOT: Gate.io Exchange Configuration
# =============================================================================
# Paper-only. Geo-restricted from US IPs — deploy from ams region.
# Uses USDT quote asset. No post-only support on spot.
# =============================================================================

exchange:
  name: "gateio"
  display_name: "Gate.io"
  exchange_id: "GATE"
  api_version: "v4"
  region: "global"
  status: "paper_only"

  environment:
    environment_var: "${ENVIRONMENT:prod}"
    sandbox: "${GATEIO_SANDBOX:true}"

  endpoints:
    rest:
      base_url: "${GATEIO_API_URL:https://api.gateio.ws}"
      sandbox_url: "https://fx-api-testnet.gateio.ws"
      timeout_seconds: 30
      max_retries: 3
    websocket:
      public_url: "wss://api.gateio.ws/ws/v4/"
      sandbox_public_url: "wss://fx-ws-testnet.gateio.ws/v4/ws"
      heartbeat_interval: 30
      reconnect_delay: 5
      max_reconnects: 10

  timing:
    clock_skew_tolerance_ms: 1000
    sync_check_interval_seconds: 3600

  health_check:
    time_path: "/api/v4/spot/time"
    interval_seconds: 60
    timeout_seconds: 10

# =============================================================================
# AUTH & SECURITY
# =============================================================================
auth:
  credentials:
    key_env: "GATEIO_API_KEY"
    secret_env: "GATEIO_API_SECRET"

  rate_limits:
    requests_per_second: 10
    requests_per_minute: 600

# =============================================================================
# SYMBOLS (MAPPING & NORMALIZATION)
# =============================================================================
symbols:
  delimiter_internal: "/"
  delimiter_stream: "-"

  # Gate.io native format: BTC_USDT (underscore-delimited)
  normalize:
    "BTC/USDT": "BTC_USDT"
    "BTC/USD": "BTC_USDT"
    "ETH/USDT": "ETH_USDT"
    "ETH/USD": "ETH_USDT"
    "SOL/USDT": "SOL_USDT"
    "SOL/USD": "SOL_USDT"
    "LINK/USDT": "LINK_USDT"
    "LINK/USD": "LINK_USDT"

  denormalize:
    "BTC_USDT": "BTC/USDT"
    "ETH_USDT": "ETH/USDT"
    "SOL_USDT": "SOL/USDT"
    "LINK_USDT": "LINK/USDT"

  ws_format: "uppercase"  # BTC_USDT

  categories:
    majors: ["BTC_USDT", "ETH_USDT"]
    altcoins: ["SOL_USDT", "LINK_USDT"]

# =============================================================================
# TRADING SPECS
# =============================================================================
trading_specs:
  precision:
    "BTC_USDT": { price_dp: 2, size_dp: 6, tick_size: 0.01, lot_size: 0.000001, min_notional: 1.0 }
    "ETH_USDT": { price_dp: 2, size_dp: 5, tick_size: 0.01, lot_size: 0.00001, min_notional: 1.0 }
    "SOL_USDT": { price_dp: 3, size_dp: 3, tick_size: 0.001, lot_size: 0.001, min_notional: 1.0 }
    "LINK_USDT": { price_dp: 4, size_dp: 3, tick_size: 0.0001, lot_size: 0.001, min_notional: 1.0 }

  fees:
    maker_bps_default: 15
    taker_bps_default: 15

  capabilities:
    spot: true
    futures: true
    limit_orders: true
    market_orders: true
    post_only: false  # Gate.io spot does not support post-only
    websocket_ohlcv: true

# =============================================================================
# DATA STREAMS & FEEDS
# =============================================================================
streams:
  redis:
    url: "${REDIS_URL:redis://localhost:6379/0}"
    ssl: "${REDIS_SSL:false}"
    decode_responses: true

  naming:
    prefix: "gateio"
    separator: ":"

  publish:
    trades: "gateio:trades:{symbol}"
    orderbook: "gateio:orderbook:{symbol}"
    ticker: "gateio:ticker:{symbol}"
    ohlcv: "gateio:ohlc:{timeframe}:{symbol}"
    heartbeat: "gateio:health"
    status: "gateio:status"
    errors: "gateio:errors"

  websocket:
    public:
      candles:
        enabled: true
        # Gate.io kline channel: spot.candlesticks
        timeframes: ["1m", "5m", "15m", "30m", "1h", "4h", "8h", "1d"]
        symbols: ["BTC_USDT", "ETH_USDT"]
      trades:
        enabled: true
        # Gate.io trade channel: spot.trades
        symbols: ["BTC_USDT", "ETH_USDT"]

  timeframe_map:
    "1m": "1m"
    "5m": "5m"
    "15m": "15m"
    "30m": "30m"
    "1h": "1h"
    "4h": "4h"
    "8h": "8h"
    "1d": "1d"
    "7d": "7d"

  processing:
    batch_size: 100
    batch_timeout_ms: 100
    buffer_size: 10000
    max_retries: 5
    retry_delay_ms: 1000

# =============================================================================
# INGESTION SETTINGS
# =============================================================================
ingestion:
  default_symbols:
    - "BTC/USDT"
    - "ETH/USDT"
  default_timeframes:
    - "1m"
    - "5m"
    - "15m"
    - "1h"
  health_interval: 30
  rest_poll_interval: 60
  reconnect:
    enabled: true
    max_attempts: 10
    base_delay_seconds: 1
    max_delay_seconds: 60
    backoff_multiplier: 2

# =============================================================================
# REGIONAL RESTRICTIONS
# =============================================================================
regional_restrictions:
  - "US"

# =============================================================================
# MONITORING
# =============================================================================
monitoring:
  metrics:
    enabled: true
    collection_interval_seconds: 60
  health_checks:
    connection: { interval_seconds: 30, timeout_seconds: 10 }
    data_freshness: { max_age_seconds: 120, check_interval_seconds: 30 }

# =============================================================================
# METADATA
# =============================================================================
metadata:
  version: "1.0.0"
  schema_version: "1.0"
  created_by: "crypto-ai-bot-system"
  docs:
    api_docs: "https://www.gate.io/docs/developers/apiv4/"
    ws_docs: "https://www.gate.io/docs/developers/apiv4/ws/en/"
