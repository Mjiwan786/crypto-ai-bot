# =============================================================================
# CRYPTO-AI-BOT: Bitfinex Exchange Configuration
# =============================================================================
# Paper-only. Geo-restricted from US IPs — deploy from ams region.
# No testnet available. Uses USD quote (not USDT).
# =============================================================================

exchange:
  name: "bitfinex"
  display_name: "Bitfinex"
  exchange_id: "BFNX"
  api_version: "v2"
  region: "global"
  status: "paper_only"

  environment:
    environment_var: "${ENVIRONMENT:prod}"
    sandbox: false

  endpoints:
    rest:
      base_url: "${BITFINEX_API_URL:https://api-pub.bitfinex.com}"
      timeout_seconds: 30
      max_retries: 3
    websocket:
      public_url: "wss://api-pub.bitfinex.com/ws/2"
      heartbeat_interval: 30
      reconnect_delay: 5
      max_reconnects: 10

  timing:
    clock_skew_tolerance_ms: 1000
    sync_check_interval_seconds: 3600

  health_check:
    time_path: "/v2/platform/status"
    interval_seconds: 60
    timeout_seconds: 10

# =============================================================================
# AUTH & SECURITY
# =============================================================================
auth:
  credentials:
    key_env: "BITFINEX_API_KEY"
    secret_env: "BITFINEX_API_SECRET"

  rate_limits:
    requests_per_minute: 90
    # Bitfinex rate limits are per-endpoint category

# =============================================================================
# SYMBOLS (MAPPING & NORMALIZATION)
# =============================================================================
symbols:
  delimiter_internal: "/"
  delimiter_stream: "-"

  # Bitfinex native format: tBTCUSD (with 't' prefix for trading pairs)
  normalize:
    "BTC/USD": "tBTCUSD"
    "ETH/USD": "tETHUSD"
    "SOL/USD": "tSOLUSD"
    "LINK/USD": "tLINKUSD"

  denormalize:
    "tBTCUSD": "BTC/USD"
    "tETHUSD": "ETH/USD"
    "tSOLUSD": "SOL/USD"
    "tLINKUSD": "LINK/USD"

  ws_format: "uppercase"  # tBTCUSD

  categories:
    majors: ["tBTCUSD", "tETHUSD"]
    altcoins: ["tSOLUSD", "tLINKUSD"]

# =============================================================================
# TRADING SPECS
# =============================================================================
trading_specs:
  precision:
    "tBTCUSD": { price_dp: 1, size_dp: 8, tick_size: 0.1, min_size: 0.00006, min_notional: 5.0 }
    "tETHUSD": { price_dp: 1, size_dp: 8, tick_size: 0.1, min_size: 0.001, min_notional: 5.0 }
    "tSOLUSD": { price_dp: 2, size_dp: 4, tick_size: 0.01, min_size: 0.04, min_notional: 5.0 }
    "tLINKUSD": { price_dp: 2, size_dp: 4, tick_size: 0.01, min_size: 0.2, min_notional: 5.0 }

  fees:
    maker_bps_default: 10
    taker_bps_default: 20

  capabilities:
    spot: true
    futures: false
    limit_orders: true
    market_orders: true
    post_only: true
    websocket_ohlcv: true

# =============================================================================
# DATA STREAMS & FEEDS
# =============================================================================
streams:
  redis:
    url: "${REDIS_URL:redis://localhost:6379/0}"
    ssl: "${REDIS_SSL:false}"
    decode_responses: true

  naming:
    prefix: "bitfinex"
    separator: ":"

  publish:
    trades: "bitfinex:trades:{symbol}"
    orderbook: "bitfinex:orderbook:{symbol}"
    ticker: "bitfinex:ticker:{symbol}"
    ohlcv: "bitfinex:ohlc:{timeframe}:{symbol}"
    heartbeat: "bitfinex:health"
    status: "bitfinex:status"
    errors: "bitfinex:errors"

  websocket:
    public:
      candles:
        enabled: true
        # Bitfinex candle key format: trade:{timeframe}:{symbol}
        timeframes: ["1m", "5m", "15m", "1h", "1D"]
        symbols: ["tBTCUSD", "tETHUSD"]
      trades:
        enabled: true
        symbols: ["tBTCUSD", "tETHUSD"]

  timeframe_map:
    "1m": "1m"
    "5m": "5m"
    "15m": "15m"
    "30m": "30m"
    "1h": "1h"
    "3h": "3h"
    "6h": "6h"
    "12h": "12h"
    "1d": "1D"
    "1w": "7D"
    "1M": "1M"

  processing:
    batch_size: 100
    batch_timeout_ms: 100
    buffer_size: 10000
    max_retries: 5
    retry_delay_ms: 1000

# =============================================================================
# INGESTION SETTINGS
# =============================================================================
ingestion:
  default_symbols:
    - "BTC/USD"
    - "ETH/USD"
  default_timeframes:
    - "1m"
    - "5m"
    - "15m"
    - "1h"
  health_interval: 30
  rest_poll_interval: 60
  reconnect:
    enabled: true
    max_attempts: 10
    base_delay_seconds: 1
    max_delay_seconds: 60
    backoff_multiplier: 2

# =============================================================================
# REGIONAL RESTRICTIONS
# =============================================================================
regional_restrictions:
  - "US"

# =============================================================================
# MONITORING
# =============================================================================
monitoring:
  metrics:
    enabled: true
    collection_interval_seconds: 60
  health_checks:
    connection: { interval_seconds: 30, timeout_seconds: 10 }
    data_freshness: { max_age_seconds: 120, check_interval_seconds: 30 }

# =============================================================================
# METADATA
# =============================================================================
metadata:
  version: "1.0.0"
  schema_version: "1.0"
  created_by: "crypto-ai-bot-system"
  docs:
    api_docs: "https://docs.bitfinex.com/reference/rest-public-candles"
    ws_docs: "https://docs.bitfinex.com/reference/ws-public-candles"
