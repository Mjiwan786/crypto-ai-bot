# =============================================================================
# CRYPTO-AI-BOT: Bybit Exchange Configuration
# =============================================================================
# Paper-only. Geo-restricted from US IPs — deploy from ams region.
# =============================================================================

exchange:
  name: "bybit"
  display_name: "Bybit"
  exchange_id: "BYBT"
  api_version: "v5"
  region: "global"
  status: "paper_only"

  environment:
    environment_var: "${ENVIRONMENT:prod}"
    sandbox: "${BYBIT_SANDBOX:true}"

  endpoints:
    rest:
      base_url: "${BYBIT_API_URL:https://api.bybit.com}"
      sandbox_url: "https://api-testnet.bybit.com"
      timeout_seconds: 30
      max_retries: 3
    websocket:
      public_url: "wss://stream.bybit.com/v5/public/spot"
      sandbox_public_url: "wss://stream-testnet.bybit.com/v5/public/spot"
      heartbeat_interval: 20
      reconnect_delay: 5
      max_reconnects: 10
      ping_interval: 20  # Bybit requires ping every 20s

  timing:
    clock_skew_tolerance_ms: 1000
    sync_check_interval_seconds: 3600

  health_check:
    time_path: "/v5/market/time"
    interval_seconds: 60
    timeout_seconds: 10

# =============================================================================
# AUTH & SECURITY
# =============================================================================
auth:
  credentials:
    key_env: "BYBIT_API_KEY"
    secret_env: "BYBIT_API_SECRET"

  rate_limits:
    requests_per_second: 10
    requests_per_minute: 600

# =============================================================================
# SYMBOLS (MAPPING & NORMALIZATION)
# =============================================================================
symbols:
  delimiter_internal: "/"
  delimiter_stream: "-"

  normalize:
    "BTC/USDT": "BTCUSDT"
    "BTC/USD": "BTCUSDT"
    "ETH/USDT": "ETHUSDT"
    "ETH/USD": "ETHUSDT"
    "SOL/USDT": "SOLUSDT"
    "SOL/USD": "SOLUSDT"
    "LINK/USDT": "LINKUSDT"
    "LINK/USD": "LINKUSDT"

  denormalize:
    "BTCUSDT": "BTC/USDT"
    "ETHUSDT": "ETH/USDT"
    "SOLUSDT": "SOL/USDT"
    "LINKUSDT": "LINK/USDT"

  ws_format: "uppercase"  # BTCUSDT

  categories:
    majors: ["BTCUSDT", "ETHUSDT"]
    altcoins: ["SOLUSDT", "LINKUSDT"]

# =============================================================================
# TRADING SPECS
# =============================================================================
trading_specs:
  precision:
    "BTCUSDT": { price_dp: 1, size_dp: 3, tick_size: 0.1, lot_size: 0.001, min_notional: 1.0 }
    "ETHUSDT": { price_dp: 2, size_dp: 3, tick_size: 0.01, lot_size: 0.001, min_notional: 1.0 }
    "SOLUSDT": { price_dp: 2, size_dp: 1, tick_size: 0.01, lot_size: 0.1, min_notional: 1.0 }
    "LINKUSDT": { price_dp: 2, size_dp: 2, tick_size: 0.01, lot_size: 0.01, min_notional: 1.0 }

  fees:
    maker_bps_default: 10
    taker_bps_default: 10

  capabilities:
    spot: true
    futures: true
    limit_orders: true
    market_orders: true
    post_only: true
    websocket_ohlcv: true

# =============================================================================
# DATA STREAMS & FEEDS
# =============================================================================
streams:
  redis:
    url: "${REDIS_URL:redis://localhost:6379/0}"
    ssl: "${REDIS_SSL:false}"
    decode_responses: true

  naming:
    prefix: "bybit"
    separator: ":"

  publish:
    trades: "bybit:trades:{symbol}"
    orderbook: "bybit:orderbook:{symbol}"
    ticker: "bybit:ticker:{symbol}"
    ohlcv: "bybit:ohlc:{timeframe}:{symbol}"
    heartbeat: "bybit:health"
    status: "bybit:status"
    errors: "bybit:errors"

  websocket:
    public:
      kline:
        enabled: true
        timeframes: ["1", "5", "15", "60", "240", "D"]
        symbols: ["BTCUSDT", "ETHUSDT"]
      trade:
        enabled: true
        symbols: ["BTCUSDT", "ETHUSDT"]

  timeframe_map:
    "1m": "1"
    "5m": "5"
    "15m": "15"
    "30m": "30"
    "1h": "60"
    "4h": "240"
    "1d": "D"
    "1w": "W"

  processing:
    batch_size: 100
    batch_timeout_ms: 100
    buffer_size: 10000
    max_retries: 5
    retry_delay_ms: 1000

# =============================================================================
# INGESTION SETTINGS
# =============================================================================
ingestion:
  default_symbols:
    - "BTC/USDT"
    - "ETH/USDT"
  default_timeframes:
    - "1m"
    - "5m"
    - "15m"
    - "1h"
  health_interval: 30
  rest_poll_interval: 60
  reconnect:
    enabled: true
    max_attempts: 10
    base_delay_seconds: 1
    max_delay_seconds: 60
    backoff_multiplier: 2

# =============================================================================
# REGIONAL RESTRICTIONS
# =============================================================================
regional_restrictions:
  - "US"

# =============================================================================
# MONITORING
# =============================================================================
monitoring:
  metrics:
    enabled: true
    collection_interval_seconds: 60
  health_checks:
    connection: { interval_seconds: 30, timeout_seconds: 10 }
    data_freshness: { max_age_seconds: 120, check_interval_seconds: 30 }

# =============================================================================
# METADATA
# =============================================================================
metadata:
  version: "1.0.0"
  schema_version: "1.0"
  created_by: "crypto-ai-bot-system"
  docs:
    api_docs: "https://bybit-exchange.github.io/docs/v5/intro"
