# Risk Configuration
# PRD-001 Section 7.1: Centralized risk management configuration

# Portfolio-Level Risk Limits
portfolio:
  # Maximum portfolio drawdown before circuit breaker
  max_drawdown_pct: 15.0  # PRD-001 Section 4.3

  # Maximum total exposure (sum of all positions)
  max_total_exposure_usd: 50000

  # Maximum single position size
  max_single_position_usd: 10000

  # Maximum number of concurrent positions
  max_concurrent_positions: 10

  # Daily loss limit (triggers halt)
  max_daily_loss_pct: 5.0  # PRD-001 Section 4.3
  max_daily_loss_usd: 1000

# Position-Level Risk Limits
position:
  # Position sizing
  min_position_size_usd: 100
  max_position_size_usd: 10000
  default_risk_per_trade_pct: 1.0

  # Stop loss and take profit
  min_stop_loss_bps: 10
  max_stop_loss_bps: 500
  min_take_profit_bps: 15
  max_take_profit_bps: 1000

  # Position duration
  max_position_duration_hours: 168  # 1 week
  force_close_on_timeout: true

# Trading Frequency Limits
frequency:
  # Maximum trades per period
  max_trades_per_minute: 10
  max_trades_per_hour: 100
  max_trades_per_day: 500  # PRD-001 Section 4.5

  # Consecutive loss management
  max_consecutive_losses: 5  # PRD-001 Section 4.5
  cooldown_after_losses_minutes: 30

  # Daily limits
  halt_on_max_daily_trades: true
  reset_daily_limits_utc_hour: 0

# Market Condition Limits
market_conditions:
  # Spread limits (PRD-001 Section 4.1)
  max_spread_bps: 10.0
  reject_trade_on_wide_spread: true

  # Volatility limits (PRD-001 Section 4.2)
  min_volatility_pct: 0.5
  max_volatility_pct: 10.0
  halt_on_extreme_volatility: true

  # Liquidity requirements
  min_24h_volume_usd: 1000000
  min_orderbook_depth_usd: 100000

# Latency and Performance
performance:
  # Maximum latency before rejection
  max_latency_ms: 500
  reject_trade_on_high_latency: true

  # Execution quality
  max_slippage_bps: 10
  reject_trade_on_high_slippage: true

# Circuit Breakers
circuit_breakers:
  # Enable/disable circuit breakers
  enabled: true

  # Drawdown circuit breaker (PRD-001 Section 4.3)
  drawdown:
    enabled: true
    threshold_pct: 15.0
    action: halt_all_trading
    notification: true

  # Loss streak circuit breaker (PRD-001 Section 4.5)
  loss_streak:
    enabled: true
    threshold: 5
    action: pause_strategy
    cooldown_minutes: 30

  # Spread circuit breaker (PRD-001 Section 4.1)
  spread:
    enabled: true
    threshold_bps: 10.0
    action: reject_trade

  # Volatility circuit breaker (PRD-001 Section 4.2)
  volatility:
    enabled: true
    threshold_pct: 10.0
    action: reduce_position_size

# Kill Switch
kill_switch:
  # Global kill switch
  enabled: false  # Manual override to stop all trading

  # Conditions that trigger kill switch
  auto_triggers:
    extreme_loss: true
    extreme_loss_threshold_pct: 20.0

    system_error: true
    repeated_errors_count: 10

    connection_loss: true
    connection_timeout_seconds: 60

# Notifications and Alerts
notifications:
  # Risk events to notify
  notify_on_drawdown_warning: true
  notify_on_circuit_breaker: true
  notify_on_kill_switch: true
  notify_on_large_loss: true
  large_loss_threshold_usd: 500

  # Notification channels
  channels:
    discord: true
    email: false
    sms: false
    prometheus: true

# Compliance and Safety
compliance:
  # Allowed symbols
  allowed_symbols:
    - BTC/USD
    - ETH/USD
    - SOL/USD
    - MATIC/USD
    - LINK/USD

  # Banned symbols (overrides allowed list)
  banned_symbols: []

  # Quote currencies
  allowed_quote_currencies:
    - USD

  # Time restrictions
  trading_hours_utc: "00:00-23:59"  # 24/7 for crypto
  blackout_dates: []  # Dates to halt trading (YYYY-MM-DD)

  # Regulatory limits
  max_leverage: 1.0  # No leverage for spot trading
  require_kyc: false  # Not applicable for API trading

# Monitoring and Logging
monitoring:
  # Log all risk events
  log_risk_events: true
  log_circuit_breaker_triggers: true
  log_rejected_trades: true

  # Metrics collection
  collect_risk_metrics: true
  metrics_interval_seconds: 60

  # Health checks
  health_check_interval_seconds: 30
  alert_on_unhealthy: true

# =============================================================================
# LIVE MODE RISK CONTROLS (Small Capital Protection)
# =============================================================================
# These settings apply ONLY when ENGINE_MODE=live
# Designed for micro-capital trading ($100-$500)
# All limits are config-driven and reversible

live_mode:
  # Enable live mode guardrails (set to false to disable all live mode restrictions)
  enabled: true

  # Capital configuration
  capital:
    # Starting capital for live trading (used for limit calculations)
    # Override with TRADING_CAPITAL_USD environment variable
    starting_capital_usd: 100.0

    # Maximum capital allowed for live mode (safety cap)
    max_capital_usd: 500.0

    # Minimum capital required (below this, engine refuses to start live)
    min_capital_usd: 50.0

  # Position sizing (scaled for micro-capital)
  position:
    # Maximum position as percentage of capital
    max_position_pct: 25.0  # $25 max on $100 capital

    # Minimum position size (must meet exchange minimums)
    min_position_usd: 5.0

    # Maximum number of concurrent positions
    max_concurrent_positions: 2

    # Risk per trade as percentage of capital
    risk_per_trade_pct: 2.0  # $2 max risk on $100 capital

  # Drawdown protection (tighter for small capital)
  drawdown:
    # Daily drawdown halt (percentage of capital)
    daily_halt_pct: 5.0  # $5 on $100 = halt for the day

    # Rolling 4-hour drawdown limit
    rolling_4h_halt_pct: 3.0  # $3 on $100

    # Maximum consecutive losses before halt
    max_consecutive_losses: 2  # Tighter than paper mode (3)

    # Cooldown after hitting limits (seconds)
    soft_cooldown_s: 1800   # 30 minutes
    hard_cooldown_s: 7200   # 2 hours (until manual reset)

  # Circuit breakers (micro-capital specific)
  circuit_breakers:
    # Spread threshold (tighter for small capital - fees matter more)
    max_spread_bps: 5.0  # 5 bps vs 10 bps for paper

    # Volatility threshold (avoid high-vol periods)
    max_volatility_pct: 5.0  # 5% vs 10% for paper

    # Minimum liquidity (ensure we can exit)
    min_24h_volume_usd: 5000000  # Higher requirement

    # Maximum latency before rejection
    max_latency_ms: 300  # 300ms vs 500ms for paper

  # Pre-flight checks (must pass before any live trade)
  preflight:
    # Require Redis connection health check
    require_redis_health: true

    # Require exchange API health check
    require_exchange_health: true

    # Require positive P&L in last N paper trades before going live
    require_paper_profit: false  # Set true for extra safety
    paper_profit_lookback_trades: 10

    # Require explicit confirmation file exists
    require_confirmation_file: false
    confirmation_file_path: "config/.live_confirmed"

  # Emergency controls
  emergency:
    # Auto-halt on any error in live mode
    halt_on_any_error: true

    # Maximum USD loss before auto-halt (hard stop)
    max_loss_usd: 20.0  # 20% of $100 capital

    # Auto-flatten all positions on halt
    flatten_on_halt: true

    # Notification webhook (optional)
    notify_on_halt: true
    webhook_url: ""  # Set via LIVE_HALT_WEBHOOK_URL env var

  # Audit logging (enhanced for live mode)
  audit:
    # Log every order attempt (not just fills)
    log_order_attempts: true

    # Log all risk check results
    log_risk_checks: true

    # Log capital snapshots every N seconds
    capital_snapshot_interval_s: 60

    # Retain logs for N days
    log_retention_days: 90
