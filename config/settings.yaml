# Minimal production configuration matching Pydantic schema exactly

mode:
  bot_mode: PAPER
  enable_trading: false
  live_trading_confirmation: ""

logging:
  level: INFO
  dir: logs/

redis:
  url: "${REDIS_URL}"
  db: 0
  client_name: "crypto-ai-bot"
  decode_responses: true
  streams:
    md_trades: "md:trades"
    md_spread: "md:spread"
    md_book: "md:orderbook"
    md_candles: "md:candles"
    signals_paper: "signals:paper"
    signals_live: "signals:live"
    active_signals: "signals:paper"
    events: "events:bus"

exchange:
  primary: "kraken"

risk:
  portfolio:
    max_drawdown_pct: 25.0
    max_single_position_notional_usd: 2000
  notional_limits:
    min_usd: 10.0
    max_usd: 10000.0
  compliance:
    kill_switch: false
    # Canonical trading pairs per PRD-001 (5 pairs)
    allowed_symbols: ["BTC/USD", "ETH/USD", "SOL/USD", "MATIC/USD", "LINK/USD"]
    banned_symbols: []
    quote_currencies_allowed: ["USD"]

strategies:
  allocations:
    scalper: 0.4
    trend: 0.3
    mean_reversion: 0.2
    breakout: 0.1

monitoring:
  prometheus:
    enabled: true
    port: 9108
  alerts:
    level: "ERROR"

discord:
  enabled: false
  webhook_url: "https://discord.com/api/webhooks/disabled"
