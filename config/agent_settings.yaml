agent:
  # Core risk management
  max_drawdown: 0.2
  risk_tolerance: "medium"
  
  # Enhanced configurations
  drawdown_protection:
    enable_soft_stops: true
    soft_stop_thresholds:
      - drawdown_pct: 0.01
        size_multiplier: 0.75
      - drawdown_pct: 0.02
        size_multiplier: 0.50
      - drawdown_pct: 0.03
        size_multiplier: 0.25
    hard_stop_threshold: 0.05
    cooldown_after_soft_stop: 600
    cooldown_after_hard_stop: 1800
  
  # Performance optimization
  config_cache:
    enabled: true
    ttl_seconds: 300
    max_cache_size: 10
    hot_reload: true
    validation_cache: true
  
  # Monitoring
  health_checks:
    enabled: true
    interval_seconds: 30
    timeout_seconds: 5
    enable_metrics: true
    alert_on_failure: true
  
  # Strategy overrides
  strategy_overrides:
    scalp:
      max_drawdown: 0.15
      risk_tolerance: "high"
      cooldown_after_loss: 30
    trend_following:
      max_drawdown: 0.25
      risk_tolerance: "medium"
      cooldown_after_loss: 60
    mean_reversion:
      max_drawdown: 0.18
      risk_tolerance: "medium"
      cooldown_after_loss: 45
    momentum:
      max_drawdown: 0.22
      risk_tolerance: "high"
      cooldown_after_loss: 30
    breakout:
      max_drawdown: 0.20
      risk_tolerance: "medium"
      cooldown_after_loss: 60
  
  # Environment overrides
  development:
    max_drawdown: 0.1
    risk_tolerance: "low"
    hot_reload: true
    enhanced_logging: true
    test_mode: true
    paper_trading_only: true
    enhanced_security: false
    strict_validation: false
  
  staging:
    max_drawdown: 0.15
    risk_tolerance: "medium"
    hot_reload: true
    enhanced_logging: true
    test_mode: true
    paper_trading_only: true
    enhanced_security: true
    strict_validation: true
  
  production:
    max_drawdown: 0.2
    risk_tolerance: "medium"
    hot_reload: false
    enhanced_logging: false
    test_mode: false
    paper_trading_only: false
    enhanced_security: true
    strict_validation: true

# Trading configuration
trading:
  pairs: ["BTC/USD", "ETH/USD", "SOL/USD"]
  parameters:
    position_size_pct: 0.5
    sl_multiplier: 1.2
    tp_multiplier: 1.8
    cooldown_s: 30.0
    max_concurrent: 2
  
  # Strategy-specific settings
  strategies:
    scalp:
      target_bps: 10.0
      stop_loss_bps: 20.0
      max_spread_bps: 50.0
      min_liquidity_score: 0.7
      max_hold_seconds: 30
      min_confidence: 0.72
      prefer_post_only: true
    
    trend_following:
      lookback_periods: 20
      trend_threshold: 0.02
      stop_loss_pct: 0.05
      take_profit_pct: 0.10
      min_confidence: 0.65
    
    mean_reversion:
      lookback_periods: 14
      reversion_threshold: 2.0
      stop_loss_pct: 0.03
      take_profit_pct: 0.06
      min_confidence: 0.60
    
    momentum:
      lookback_periods: 10
      momentum_threshold: 0.015
      stop_loss_pct: 0.04
      take_profit_pct: 0.08
      min_confidence: 0.68
    
    breakout:
      lookback_periods: 15
      breakout_threshold: 0.025
      stop_loss_pct: 0.06
      take_profit_pct: 0.12
      min_confidence: 0.70

# Redis configuration
redis:
  url: "${REDIS_URL}"
  max_connections: 10
  retry_on_timeout: true
  health_check_interval: 30

# Kraken configuration
kraken:
  api_key: "${KRAKEN_API_KEY}"
  api_secret: "${KRAKEN_API_SECRET}"
  sandbox: false
  rate_limit: 1.0

# AI Engine configuration
ai_engine:
  strategy_selector:
    enabled: true
    update_interval: 300  # 5 minutes
    confidence_threshold: 0.6
    max_gross_allocation: 2.0
    step_allocation: 0.25
  
  adaptive_learner:
    enabled: true
    mode: "shadow"  # shadow, active
    update_interval: 3600  # 1 hour
    min_trades: 200
    confidence_threshold: 0.6
    windows:
      short: 50
      medium: 200
      long: 1000
    thresholds:
      good_sharpe: 1.0
      poor_sharpe: 0.2
      hit_rate_good: 0.55
      hit_rate_poor: 0.45

# Monitoring configuration
monitoring:
  prometheus:
    enabled: true
    port: 9090
  
  grafana:
    enabled: true
    dashboards_path: "monitoring/grafana_dashboards"
  
  alerts:
    enabled: true
    webhook_url: "${ALERT_WEBHOOK_URL}"
    channels: ["slack", "email"]
  
  health_checks:
    interval_seconds: 30
    timeout_seconds: 5
    enable_metrics: true
    alert_on_failure: true

# Data pipeline configuration
data_pipeline:
  pairs: ["BTC/USD", "ETH/USD", "SOL/USD"]
  redis_url: "${REDIS_URL}"
  create_consumer_groups: true
  startup_backfill_enabled: true
  compression_enabled: true
  batch_size: 100
  flush_interval: 1.0

# Risk management configuration
risk_management:
  daily_stop_usd: 100.0
  max_spread_bps: 50.0
  max_latency_ms: 100
  position_limits:
    max_position_usd: 10000.0
    max_concurrent_positions: 5
    max_correlation: 0.7
  
  circuit_breakers:
    max_daily_loss: 0.05
    max_consecutive_losses: 3
    max_drawdown: 0.15
    cooldown_after_trigger: 3600

# Performance optimization
performance:
  config_cache:
    enabled: true
    ttl_seconds: 300
    max_cache_size: 10
    hot_reload: true
    validation_cache: true
  
  memory:
    max_config_history: 5
    enable_compression: true
    cleanup_interval: 3600
    max_memory_mb: 100
  
  threading:
    config_update_timeout: 1.0
    max_concurrent_loads: 2
    thread_priority: "normal"
    enable_async_loading: true

# Logging configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  handlers:
    - type: "console"
      level: "INFO"
    - type: "file"
      level: "DEBUG"
      filename: "logs/trading_system.log"
      max_bytes: 10485760  # 10MB
      backup_count: 5
    - type: "file"
      level: "ERROR"
      filename: "logs/errors.log"
      max_bytes: 5242880   # 5MB
      backup_count: 3