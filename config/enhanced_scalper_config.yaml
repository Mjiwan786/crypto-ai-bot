dynamic_sizing:
  enabled: true
  base_risk_pct_small: !!python/object/apply:numpy._core.multiarray.scalar
  - &id001 !!python/object/apply:numpy.dtype
    args:
    - f8
    - false
    - true
    state: !!python/tuple
    - 3
    - <
    - null
    - null
    - null
    - -1
    - -1
    - 0
  - !!binary |
    zczMzMzM9D8=
  base_risk_pct_large: !!python/object/apply:numpy._core.multiarray.scalar
  - *id001
  - !!binary |
    pHA9Ctej8D8=
  equity_threshold_usd: 15000.0
  streak_boost_pct: !!python/object/apply:numpy._core.multiarray.scalar
  - *id001
  - !!binary |
    mpmZmZmZuT8=
  max_streak_boost_pct: 1.0
  max_streak_count: 5
  high_vol_multiplier: 0.8
  normal_vol_multiplier: 1.0
  high_vol_threshold_atr_pct: 2.0
  portfolio_heat_threshold_pct: 80.0
  portfolio_heat_cut_multiplier: 0.5
  min_position_size_multiplier: 0.1
  max_position_size_multiplier: 3.0
  allow_runtime_overrides: true
  override_expiry_seconds: 3600
scalper:
  # PRD-001 Canonical Trading Pairs (5 pairs)
  pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - MATIC/USD  # Note: Requires Binance fallback - not on Kraken WS
  - LINK/USD
  target_bps: !!python/object/apply:numpy._core.multiarray.scalar
  - *id001
  - !!binary |
    AAAAAAAAMUA=
  target_bps_high_vol: 20
  high_vol_atr_threshold: 2.0
  stop_loss_bps: !!python/object/apply:numpy._core.multiarray.scalar
  - *id001
  - !!binary |
    AAAAAACAMUA=
  timeframe: 15s
  enable_5s_bars: false
  preferred_order_type: limit
  post_only: true
  hidden_orders: false
  max_slippage_bps: 4
  max_trades_per_minute: ${SCALPER_MAX_TRADES_PER_MINUTE:4}
  cooldown_after_loss_seconds: 90
  daily_trade_limit: 150
  max_hold_seconds: 120
  max_spread_bps: 3.0
  min_liquidity_usd: 1000000.0
  max_signal_latency_ms: 50
  max_e2e_latency_ms: 150
strategy_router:
  strategy_allocations:
    breakout: 0.25
    mean_reversion: 0.2
    momentum: 0.25
    trend_following: 0.3
    sideways: 0.15
  min_confidence: 0.3
  high_confidence: 0.7
strategies:
  breakout:
    resistance_window: 20
    min_breakout_ratio: 0.5
    volume_requirement: 1.5
    atr_multiplier: 2.0
    retest_allowed: true
    false_breakout_filter: true
    confirmation_bars: 1
    risk_multiple_tp:
    - 1.0
    - 2.0
    - 3.0
    trailing_atr: 1.5
    max_spread: 0.001
    min_confidence: 0.75
    fee_bps: 10.0
    slippage_bps: 10.0
    side: both
    # PRD-001 Canonical Trading Pairs
    symbol_whitelist:
    - BTC/USD
    - ETH/USD
    - SOL/USD
    - MATIC/USD
    - LINK/USD
  mean_reversion:
    bollinger_window: 20
    std_dev: 2.0
    entry_zones:
      oversold: 0.3
      overbought: 0.7
    exit_at_mean: true
    cooloff_bars: 2
    min_liquidity_usd: 1000000
    volume_ratio_min: 0.8
    rsi_filter:
      enabled: true
      period: 14
      oversold: 35
      overbought: 65
    max_hold_bars: 24
    max_positions: 1
  momentum:
    rsi_period: 10
    vwap_window: 14
    rsi_range:
    - 40
    - 70
    vwap_gap: 0.01
    trailing_stop: 0.01
    min_volume_ratio: 1.2
    confirmation_candles: 2
    max_position_hold_hours: 24
  trend_following:
    ema_short: 9
    ema_long: 21
    atr_period: 14
    min_trend_strength: 0.3
    entry_conditions:
      confirmation_bars: 2
      volume_ratio: 1.2
    base_position_size: 0.05
    max_position_size: 0.15
  sideways:
    grid_size: 0.005
    max_grid_levels: 10
    position_size: 0.05
    volatility_cutoff: 0.01
    base_confidence: 0.6
    stop_loss: 0.02
    volatility_method: atr
    atr_period: 14
    std_window: 20
  overnight_momentum:
    # Feature Flags
    enabled: ${OVERNIGHT_MOMENTUM_ENABLED:false}
    backtest_only: ${OVERNIGHT_BACKTEST_ONLY:true}

    # Session Configuration (UTC hours)
    session:
      asian_start_utc: 0
      asian_end_utc: 8

    # Entry Criteria
    entry:
      volume_percentile_max: ${OVERNIGHT_VOLUME_PERCENTILE_MAX:50.0}  # Max 50th percentile
      momentum_threshold: ${OVERNIGHT_MOMENTUM_THRESHOLD:0.6}  # 0.0 to 1.0
      min_price_change_pct: 0.5
      min_volatility_expansion: 1.2

    # Target & Risk (basis points and percentages)
    targets:
      target_min_pct: ${OVERNIGHT_TARGET_MIN:1.0}  # 100 bps
      target_max_pct: ${OVERNIGHT_TARGET_MAX:3.0}  # 300 bps
      default_target_pct: ${OVERNIGHT_TARGET_DEFAULT:1.5}  # 150 bps
      trailing_stop_pct: ${OVERNIGHT_TRAILING_STOP:0.7}  # 70 bps
      trailing_stop_min_pct: 0.5  # 50 bps
      trailing_stop_max_pct: 1.0  # 100 bps

    # Position Limits
    limits:
      max_concurrent_positions: 1  # Hard cap
      max_position_size_usd: ${OVERNIGHT_MAX_POSITION_USD:5000}
      min_position_size_usd: ${OVERNIGHT_MIN_POSITION_USD:100}

    # Leverage Proxy (Spot Only - NO MARGIN)
    leverage:
      use_margin: ${OVERNIGHT_USE_MARGIN:false}  # NEVER enable
      spot_notional_multiplier: ${OVERNIGHT_NOTIONAL_MULTIPLIER:2.0}
      max_notional_multiplier: 3.0

    # Risk Management
    risk:
      risk_per_trade_pct: ${OVERNIGHT_RISK_PER_TRADE:1.0}  # 1% risk
      use_atr_sizing: false
      max_correlation: 0.7
      max_portfolio_heat_pct: ${OVERNIGHT_MAX_PORTFOLIO_HEAT:10.0}  # Max 10% heat

    # Exit Conditions
    exit:
      session_end_exit: true
      max_hold_hours: 8
      volatility_spike_threshold: 2.0
      drawdown_exit_pct: 2.0

    # Promotion Gates (Backtest -> Live)
    promotion_gates:
      min_trades: ${OVERNIGHT_PROMOTION_MIN_TRADES:50}
      min_win_rate: ${OVERNIGHT_PROMOTION_MIN_WIN_RATE:0.55}
      min_sharpe: ${OVERNIGHT_PROMOTION_MIN_SHARPE:1.5}
      max_drawdown: ${OVERNIGHT_PROMOTION_MAX_DRAWDOWN:0.10}
      min_profit_factor: 1.5
      min_consecutive_days: 30
      max_losing_streak: 5

    # Symbol Whitelist/Blacklist
    symbols:
      whitelist:
        - BTC/USD
        - ETH/USD
      blacklist:
        - SOL/USD  # Too volatile

    # Validation Bounds (fail-fast limits)
    validation_bounds:
      risk_per_trade_pct:
        min: 0.1
        max: 5.0
      trailing_stop_pct:
        min: 0.3
        max: 2.0
      target_pct:
        min: 0.5
        max: 5.0
      notional_multiplier:
        min: 1.0
        max: 3.0
      portfolio_heat_pct:
        min: 1.0
        max: 20.0
      volume_percentile_max:
        min: 10.0
        max: 90.0
      momentum_threshold:
        min: 0.1
        max: 1.0

    # Monitoring & Alerts
    monitoring:
      alert_on_entry: true
      alert_on_exit: true
      alert_on_trailing_stop_update: false
      log_level: ${OVERNIGHT_LOG_LEVEL:INFO}

    # Redis Streams
    redis:
      publish_signals: true
      publish_exits: true
      signal_stream: overnight:signals
      exit_stream: overnight:exits
      position_stream: overnight:positions
      config_update_stream: overnight:config_updates

    # Audit & Compliance
    audit:
      log_all_decisions: true
      log_file: logs/overnight_momentum_audit.log
      redis_audit_stream: overnight:audit
regime_adaptation:
  sideways_target_bps: 8
  sideways_stop_bps: 4
  sideways_max_trades: 6
  bull_target_bps: 12
  bull_stop_bps: 6
  bull_max_trades: 4
  bear_target_bps: 12
  bear_stop_bps: 6
  bear_max_trades: 4
signal_filtering:
  min_alignment_confidence: 0.3
  min_strategy_alignment: 0.6
  require_alignment: false
  min_regime_confidence: 0.3
  min_scalping_confidence: 0.5
enhanced_validation:
  min_enhanced_confidence: 0.6
  min_regime_confidence: 0.4
  require_strategy_alignment: false
trading:
  base_position_size: 0.15
  dynamic_sizing:
    enabled: true
    volatility_multiplier: 1.8
    max_position: 0.3
risk:
  daily_stop_loss: -0.05
  circuit_breakers:
  - trigger: 3_losses_in_row
    action: reduce_size_50%
  - trigger: 5_losses_in_row
    action: pause_1h
  max_daily_operations: 5
ai_engine:
  mode: hypergrowth
  daily_profit_target: 0.015
  max_daily_loss: -0.03
  regime_detection:
    enabled: true
    update_interval_seconds: 300
    confidence_threshold: 0.4
redis:
  enabled: true
  host: localhost
  port: 6379
  db: 0
  password: null
  streams:
    signals: stream:enhanced_scalper:signals
    metrics: stream:enhanced_scalper:metrics
    regime: stream:enhanced_scalper:regime
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: logs/enhanced_scalper.log
  max_size: 10MB
  backup_count: 5
monitoring:
  prometheus:
    enabled: true
    port: 8000
  metrics:
  - signals_generated_total
  - signals_aligned_total
  - signals_filtered_total
  - regime_adaptations_total
  - strategy_confidence_histogram
  - enhanced_confidence_histogram
  - signal_latency_histogram
