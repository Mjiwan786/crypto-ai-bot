# Bar Reaction 5m Strategy Configuration - SYNTHETIC TEST
# Widened filters to accept synthetic data for engine validation
# DO NOT USE IN PRODUCTION - for testing only

strategy:
  name: "bar_reaction_5m_synthetic_test"
  description: "5-minute bar-close reaction with widened filters for synthetic data"
  timeframe: "5m"
  mode: "trend"

  # Trigger settings
  trigger_mode: "open_to_close"
  trigger_bps_up: 15.0    # Lower to catch more signals
  trigger_bps_down: 15.0

  # ATR volatility gates - WIDENED for synthetic data
  min_atr_pct: 0.01   # Very low floor
  max_atr_pct: 15.0   # Very high ceiling (synthetic data has high vol)
  atr_window: 14

  # ATR-based risk management
  sl_atr: 1.5
  tp1_atr: 2.5
  tp2_atr: 4.0

  # Position sizing
  risk_per_trade_pct: 1.2
  min_position_usd: 50.0   # Death spiral prevention
  max_position_usd: 2000.0

  # Execution constraints
  maker_only: true
  spread_bps_cap: 50.0  # Widened for synthetic

  # Extreme fade logic - disabled
  enable_extreme_fade: false

# Regime Filtering - DISABLED for synthetic test
regime:
  enable_regime_filter: false

# Safety Gates
safety:
  max_daily_loss_pct: 20.0     # Relaxed for test
  max_drawdown_pct: 25.0
  max_consecutive_losses: 10
  cooldown_after_stop_bars: 0

# Backtesting configuration
backtest:
  lookback_days: 180
  warmup_bars: 50
  maker_fee_bps: 16
  taker_fee_bps: 26
  slippage_bps: 2
  fill_model: "maker"
  queue_bars: 1
  partial_fills: false

# Trading pairs
pairs:
  - "BTC/USD"

# Risk limits
risk:
  max_concurrent_positions: 2
  max_daily_trades: 100  # Higher limit for testing
  max_daily_loss_pct: 20.0
  max_total_exposure_pct: 200.0
  scale_out_enabled: true
  tp1_size_pct: 50.0
  tp2_size_pct: 50.0
  trailing_stop_enabled: false

# Protection Mode - disabled for test
protection_mode:
  enabled: false
