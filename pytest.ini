[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers - custom test categories
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may use external services like Redis)
    slow: Tests that take >5s to run
    network: Tests that require network access
    redis: Tests that require Redis connection
    smoke: Quick smoke tests to verify basic functionality
    asyncio: Async tests (automatically applied by pytest-asyncio)

# Command-line options
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
    --disable-warnings

# Coverage configuration
# Run with: pytest --cov --cov-report=term-missing --cov-report=html
[tool:pytest]
cov_fail_under = 90

# Filter warnings - ignore noisy deprecations from dependencies
filterwarnings =
    ignore::DeprecationWarning:redis.*
    ignore::DeprecationWarning:ccxt.*
    ignore::DeprecationWarning:pydantic.*
    ignore::PendingDeprecationWarning
    ignore:.*urllib3.*:DeprecationWarning
    ignore:.*np.float_.*:DeprecationWarning

# Asyncio configuration
asyncio_mode = auto

# Timeout configuration
timeout = 60
timeout_method = thread
timeout_func_only = False

# Log configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Minimum Python version
minversion = 3.10
